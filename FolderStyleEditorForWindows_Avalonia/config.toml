# FolderStyleEditorForWindows configuration
ConfigSchemaVersion = 2
Language = ""
LanguageConfigured = false

[Features]
PinDoubleClickThreshold = 500

[Features.PermissionPrompt]
SuppressElevationPrompt = false

[AppInfo]
  HelpIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/message-circle-question-mark.svg"
  GitHubIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/github.svg"
  StarIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/star.svg"

[HoverIcon]
  DefaultIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/file.svg"
  ErrorIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/ban.svg"

  [HoverIcon.FileTypes]
  Supported = ["exe", "dll", "ico"]
  SupportedToConvert = ["png", "jpg", "jpeg", "bmp", "svg", "webp"]

  [[HoverIcon.MainIcons]]
  Extensions = ["exe", "dll"]
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/app-window.svg"

  [[HoverIcon.MainIcons]]
  Extensions = ["ico"]
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/book-image.svg"

  [[HoverIcon.BadgeIcons]]
  Status = "Supported"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/badge/check.svg"

  [[HoverIcon.BadgeIcons]]
  Status = "SupportedToConvert"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/badge/archive-restore.svg"

  [[HoverIcon.BadgeIcons]]
  Status = "Error"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/ban.svg"

[PinIcon]
  MainIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/pin.svg"
  PinnedIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/pin.svg"
  UnpinnedIcon = "avares://FolderStyleEditorForWindows/Resources/SVG/pin-off.svg"
  TestPngPath = "avares://FolderStyleEditorForWindows/Resources/PNG/test-pin.png"

  [[PinIcon.BadgeIcons]]
  State = "Ready"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/badge/arrow-down-0-1.svg"

  [[PinIcon.BadgeIcons]]
  State = "Waiting"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/badge/arrow-down-1-0.svg"

  [[PinIcon.BadgeIcons]]
  State = "Success"
  IconPath = "avares://FolderStyleEditorForWindows/Resources/SVG/badge/check.svg"

[Animations]
ToastAnimationDuration = 300

[Appearance]
SvgDefaultColor = "#ff606064"

[Debug]
EnableOverlay = false
ShowHoverIconBackgroundColor = true
HoverIconBgColor = "#DD4444"
ShowSvgTest = true
SvgTestPath = "avares://FolderStyleEditorForWindows/Resources/SVG/book-image.svg"
ShowPngTest = true
PngTestPath = "avares://FolderStyleEditorForWindows/Resources/PNG/test-pin.png"
SvgOpacity = 0.75
ShowHoverIconClone = true

[LanguageDefaults]
ChineseCultures = ["zh-CN", "zh-Hans", "zh-CHS", "zh-Hant", "zh-HK", "zh-TW"]
EnglishCultures = ["en-US", "en-GB", "en"]
DefaultCulture = "zh-CN"

[DragOverlay]
DismissOnEsc = false
ShowPrimaryButton = false
ShowSecondaryButton = false
AllowOverlayClickDismiss = false

[Dialog]
DefaultDismissOnEsc = true
DefaultAllowOverlayClickDismiss = false

[Ui]
DragIndicatorStrokeColor = "#AAB7C3"
DragIndicatorStrokeOpacity = 0.86
DragOverlayMainTextColor = "#303034"
DragOverlayWarningTextColor = "#E07167"

[Paths]
PreferredDataRoot = ""

[Permissions]
SuppressElevationPrompt = false

[FrameRate]
StaticContentRefreshFps = 0
BackgroundAmbientFps = 6
HomeTitleAmbientFps = 12
AdminTitleAmbientFps = 12
EditHintCarouselFps = 16
ActiveInteractionFps = 60
UseDisplayRefreshRateAsMaxFps = true
ManualMaxFps = 120
HoverCooldownMs = 120
ScrollCooldownMs = 240
DragCooldownMs = 280
ShowPerformanceMonitor = false
ShowDetailedPerformanceMonitor = false
ShowComponentFpsBadges = false
EnableComponentExcludeMode = false
ExcludePinGlow = false
ExcludeBottomActionButtons = false
ExcludeActualTopmost = false
DisableEditScrollAnimations = false

[EditHintCarousel]
RotationIntervalSeconds = 3
EnabledItems = ["folder", "icon", "image", "alias"]
FolderGradientStart = "#F6D365"
FolderGradientEnd = "#FDA085"
IconGradientStart = "#A8E063"
IconGradientEnd = "#96E6A1"
ImageGradientStart = "#5EE7DF"
ImageGradientEnd = "#66A6FF"
AliasGradientStart = "#F9A8D4"
AliasGradientEnd = "#C084FC"
